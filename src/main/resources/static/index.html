<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Comparison Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-logo" onclick="navigate('suites')" title="API Comparison Tool">⚡</div>
    <div class="nav-item" data-page="suites" onclick="navigate('suites')">📂<div class="nav-tooltip">Suites</div></div>
    <div class="nav-item" data-page="groups" onclick="navigate('groups')">⊞<div class="nav-tooltip">Groups</div></div>
    <div class="nav-item" data-page="results" onclick="navigate('results')">
      📊
      <div class="nav-badge" id="tasksBadge" style="display:none">0</div>
      <div class="nav-tooltip">Results</div>
    </div>
    <div class="nav-spacer"></div>
    <div class="nav-item" data-page="config" onclick="navigate('config')">⚙<div class="nav-tooltip">Config</div></div>
  </aside>

  <!-- Header -->
  <header id="header">
    <div class="header-breadcrumb" id="breadcrumb"><span class="breadcrumb-current">Suites</span></div>

    <div class="dropdown-wrap">
      <div class="header-suite-selector" onclick="toggleSuiteDropdown()">
        <div class="suite-dot"></div>
        <span id="suiteSelectorLabel">Select suite</span>
        <span style="font-size:10px;color:var(--t-muted);margin-left:4px">▾</span>
      </div>
      <div class="dropdown-menu hidden" id="suiteDropdownMenu"></div>
    </div>

    <div class="vm-bar" title="Verification Mode filter for new task runs">
      <button class="vm-btn active" data-vm="all" onclick="setVm('all')">ALL</button>
      <button class="vm-btn" data-vm="comparison" onclick="setVm('comparison')">CMP</button>
      <button class="vm-btn" data-vm="automation" onclick="setVm('automation')">AUTO</button>
      <button class="vm-btn" data-vm="both" onclick="setVm('both')">BOTH</button>
    </div>

    <div class="run-btn-group">
      <button class="run-btn-main" onclick="runSuite([])">▶ Run</button>
      <div class="dropdown-wrap">
        <button class="run-btn-drop" onclick="toggleRunGroupDropdown()">▾</button>
        <div class="dropdown-menu hidden" id="headerRunDropMenu"></div>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main id="main"></main>

  <!-- Task Monitor -->
  <div id="monitor">
    <div class="monitor-bar" onclick="toggleMonitor()">
      <span class="monitor-label" id="monitorLabel">No active tasks</span>
      <div class="monitor-chips" id="monitorChips"></div>
      <button class="monitor-toggle" id="monitorToggle">▲</button>
    </div>
    <div class="monitor-expanded-area" id="monitorExpandedArea"></div>
  </div>
</div>

<div id="toast-container"></div>

<script src="/js/app.js"></script>
<script src="/js/page-suite.js"></script>
<script src="/js/page-groups.js"></script>
<script src="/js/page-testcases.js"></script>
<script src="/js/page-results.js"></script>
<script src="/js/page-config.js"></script>
<script>
function toggleRunGroupDropdown() {
  const menu = document.getElementById('headerRunDropMenu');
  menu.classList.toggle('hidden');
  const suite = state.suites.find(s => s.id === state.activeSuiteId);
  menu.innerHTML = (suite?.testGroups||[]).map(g =>
    `<div class="dropdown-item" onclick="runSuite(['${esc(g.name)}']);document.getElementById('headerRunDropMenu').classList.add('hidden')">▶ ${esc(g.name)}</div>`
  ).join('') +
  `<div class="dropdown-divider"></div>
   <div class="dropdown-item" onclick="runSuite([]);document.getElementById('headerRunDropMenu').classList.add('hidden')">▶ Run All</div>`;
}
initApp();
</script>
</body>
</html>
