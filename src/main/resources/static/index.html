<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>API Comparison Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sb-logo" onclick="go('suites')" title="API Comparison Tool">⚡</div>
    <div class="sb-item" data-page="suites" onclick="go('suites')">📂<div class="sb-tip">Suites</div></div>
    <div class="sb-item" data-page="groups" onclick="go('groups')">⊞<div class="sb-tip">Groups</div></div>
    <div class="sb-item" data-page="results" onclick="go('results')">
      📊
      <div class="sb-badge" id="taskBadge" style="display:none">0</div>
      <div class="sb-tip">Results</div>
    </div>
    <div class="sb-spacer"></div>
    <div class="sb-item" data-page="config" onclick="go('config')">⚙<div class="sb-tip">Config</div></div>
  </aside>

  <!-- Header -->
  <header id="header">
    <div class="hd-breadcrumb" id="breadcrumb"><span class="hd-bc-cur">Suites</span></div>

    <div class="dd-wrap">
      <div class="suite-sel" onclick="toggleSuiteDd()">
        <div class="suite-dot"></div>
        <span class="suite-sel-name" id="suiteSelName">Select suite</span>
        <span style="font-size:10px;color:var(--t3);flex-shrink:0">▾</span>
      </div>
      <div class="dd-menu hidden" id="suiteDdMenu"></div>
    </div>

    <div class="dd-wrap">
      <div class="run-group">
        <button class="run-main" onclick="runSuite([]);go('results')">▶ Run</button>
        <button class="run-caret" onclick="toggleRunDd()">▾</button>
      </div>
      <div class="dd-menu hidden" id="runDdMenu"></div>
    </div>
  </header>

  <!-- Main -->
  <main id="main"></main>

  <!-- Task Monitor -->
  <div id="monitor">
    <div class="mon-bar" onclick="toggleMonitor()">
      <span class="mon-label" id="monLabel">No active tasks</span>
      <div class="mon-chips" id="monChips"></div>
      <button class="mon-toggle">▲</button>
    </div>
    <div class="mon-body" id="monBody"></div>
  </div>

</div>
<div id="toasts"></div>

<script src="/js/app.js"></script>
<script src="/js/page-suite.js"></script>
<script src="/js/page-groups.js"></script>
<script src="/js/page-testcases.js"></script>
<script src="/js/page-results.js"></script>
<script src="/js/page-config.js"></script>
<script>init();</script>
</body>
</html>
